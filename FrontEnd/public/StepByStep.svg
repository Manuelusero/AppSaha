<!-- Textos -->
<text fill="black" xml:space="preserve" style="white-space: pre" font-family="Maitree" font-size="32" font-weight="500" letter-spacing="0em"><tspan x="834" y="182.2">Indica el servicio que buscas y tu ubicación</tspan></text>
<text fill="black" xml:space="preserve" style="white-space: pre" font-family="Maitree" font-size="32" font-weight="500" letter-spacing="0em"><tspan x="62" y="391.2">Elegí la especialidad que más se adapte</tspan><tspan x="62" y="439.2">a tu necesidad</tspan></text>
<text fill="black" xml:space="preserve" style="white-space: pre" font-family="Maitree" font-size="32" font-weight="500" letter-spacing="0em"><tspan x="834" y="572.2">Selecciona uno o varios prestadores para</tspan><tspan x="834" y="620.2">que te envíen un presupuesto.</tspan></text>
<text fill="black" xml:space="preserve" style="white-space: pre" font-family="Maitree" font-size="32" font-weight="500" letter-spacing="0em"><tspan x="62" y="751.2">Detalla tu necesidad incluso podes agregar</tspan><tspan x="62" y="799.2">fotos para ilustrar.</tspan></text>
<text fill="black" xml:space="preserve" style="white-space: pre" font-family="Maitree" font-size="32" font-weight="500" letter-spacing="0em"><tspan x="834" y="962.2">Indica donde quieres recibir los presupuestos.</tspan></text>

